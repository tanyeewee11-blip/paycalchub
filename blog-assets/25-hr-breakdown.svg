<svg viewBox="0 0 700 260" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="700" height="260" fill="#f7f6f3" rx="14"/>

  <text x="40" y="42" font-size="20" font-weight="700" fill="#1a1915">$25/Hour — Where Your Paycheck Goes</text>
  <text x="40" y="64" font-size="13" fill="#6b6960">Gross $52,000/year &#8226; single filer, no state tax &#8226; effective rate 15.8%</text>

  <!-- Stacked bar (clipped to rounded rect so segments don't poke past the corners) -->
  <defs>
    <clipPath id="barclip-25">
      <rect x="40" y="145" width="620" height="56" rx="8"/>
    </clipPath>
  </defs>
  <g clip-path="url(#barclip-25)">
    <rect x="40" y="145" width="620" height="56" fill="#e4e2dc"/>
    <rect x="40.0" y="145" width="50.6" height="56" fill="#c1503f" opacity="0.55"/>
    <rect x="90.6" y="145" width="47.4" height="56" fill="#c1503f" opacity="0.32"/>
    <rect x="138.0" y="145" width="522.0" height="56" fill="#1e6b4a"/>
  </g>
  <rect x="40" y="145" width="620" height="56" rx="8" fill="none" stroke="#e4e2dc" stroke-width="1"/>

  <!-- Take-home label inside bar if wide enough -->
  <text x="399.0" y="178.0" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">$43,781</text>

  <!-- Legend -->
  <g>
    <rect x="40" y="222" width="14" height="14" rx="3" fill="#c1503f" opacity="0.55"/>
    <text x="60" y="233" font-size="12" fill="#1a1915">Federal tax: $4,241</text>

    <rect x="220" y="222" width="14" height="14" rx="3" fill="#c1503f" opacity="0.32"/>
    <text x="240" y="233" font-size="12" fill="#1a1915">FICA: $3,978</text>

    <rect x="340" y="222" width="14" height="14" rx="3" fill="#1e6b4a"/>
    <text x="360" y="233" font-size="12" fill="#1a1915">Take-home: $43,781</text>
  </g>

  <text x="660" y="233" font-size="11" fill="#6b6960" text-anchor="end">paycalchub.com</text>
</svg>